plugins {
	id 'net.fabricmc.fabric-loom' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	def archiveMinecraftVersion = project.findProperty("archive_minecraft_version") ?: project.minecraft_version
	archivesName = "${project.archives_base_name}+mc${archiveMinecraftVersion}"
}

repositories {
    mavenCentral()
	maven {	url = 'https://maven.fabricmc.net/'}
    maven { url = "https://maven.shedaniel.me/" }
    maven { url = "https://maven.terraformersmc.com/releases/" }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
    implementation("me.shedaniel.cloth:cloth-config-fabric:${project.cloth_config_version}") { 
        exclude(group: "net.fabricmc.fabric-api") 
    }
    implementation "com.terraformersmc:modmenu:${project.modmenu_version}"
}

processResources {
	def targetVersion = project.version
	inputs.property "version", targetVersion

	filesMatching("fabric.mod.json") {
		expand "version": targetVersion
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 25
	it.options.encoding = 'UTF-8'
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

jar {
	def baseName = project.base.archivesName.get()
	from("LICENSE") {
		rename { "${it}_${baseName}" }
	}
}

publishing {
	publications {
		mavenJava(MavenPublication) {
			from components.java
		}
	}

	repositories {
		// publish config optional
	}
}
